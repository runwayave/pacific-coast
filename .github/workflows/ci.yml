# Pacific-coast CI.
#
# Gates every PR on: build, vet, lint, unit tests, codegen freshness,
# migration up/down/up safety, and integration tests against ephemeral
# Postgres + memcached. Integration suite needs Docker; we use GitHub
# Actions' built-in Docker runtime via testcontainers-go.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: bufbuild/buf-setup-action@v1
        with:
          # buf generate populates clients/go/pb from atlantis/common/v1
          # protos. Without this step internal/runtime/pagination.go
          # fails to compile (gen-less repo — pb output is gitignored).
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: codegen + build
        # `make codegen` runs tidectl + buf generate, then builds every
        # in-scope Go package. Conditionally builds gen/ + cmd/server
        # only when .atl fixtures populated gen/ (this repo ships none
        # by design — callers run codegen against their own schemas).
        run: make codegen

      - name: go vet
        # Skips cmd/server + gen/ — they only compile when caller .atl
        # fixtures have been applied, which CI doesn't do.
        run: go vet ./cmd/tide ./cmd/tidectl ./internal/...

      - name: unit tests with race detector
        run: go test -race ./cmd/tide ./cmd/tidectl ./internal/...

      - name: codegen freshness
        # Catches "edited .atl but forgot to regenerate." If make codegen
        # produces different bytes than gen/, fail loudly so the PR author
        # knows to run codegen + commit before merging.
        run: make codegen-check

      - name: integration tests
        # testcontainers-go spins up Postgres against GitHub Actions'
        # Docker. Scoped to tests/integration/backfill/ — the parent
        # tests/integration package (crud_test.go, grpc_test.go) needs
        # gen/go/server, which only exists after running codegen against
        # real caller .atl files. The backfill subpackage is gen-free
        # by design.
        run: go test -tags=integration -timeout=10m ./tests/integration/backfill/...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: bufbuild/buf-setup-action@v1
        with:
          # Lint typechecks every Go file, including internal/runtime/
          # pagination.go which imports atlantis-go/pb/atlantis/common/v1
          # — that package is generated by buf from atlantis/common/v1
          # protos. Without buf, golangci-lint fails before it lints.
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: codegen
        # Populates clients/go/pb/ so the lint step can typecheck the
        # entire module. Same dependency the build+test job needs.
        run: make codegen

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pin a v2 release; .golangci.yml uses `version: "2"` which
          # requires golangci-lint v2.x. The previous "latest" pin
          # resolved to a stale v1.64.8 cache (v1 series, built with
          # Go 1.24 — refused to analyse our Go 1.25.0 target).
          version: v2.12.2
          # Explicit package list skips cmd/server, which imports the
          # gen-less gen/go/server package — only populated when codegen
          # runs against real caller .atl files (this repo ships none by
          # design). Same scoping the go-vet and go-test steps use.
          args: ./cmd/tide/... ./cmd/tidectl/... ./internal/...

  migration-safety:
    name: migrate up/down/up
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-all
        env:
          POSTGRES_USER: atlantis
          POSTGRES_PASSWORD: atlantis
          POSTGRES_DB: atlantis
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_URL: postgres://atlantis:atlantis@localhost:5432/atlantis?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - name: install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/latest/download/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: migrate-roundtrip
        # up → down → up against a fresh Postgres so a broken .down.sql
        # can't slip through. Exercises every migration in migrations/.
        run: make migrate-roundtrip
