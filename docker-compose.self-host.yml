# atlantis self-hosting bundle.
#
# Usage:
#   cp deploy/.env.example .env
#   # fill PG_PASSWORD and CONSOLE_SESSION_SECRET in .env
#   docker compose -f docker-compose.self-host.yml up -d
#
# First boot: the 'certs' service generates a local CA + server cert +
# console client cert and splits the CA key into the private volume, then
# exits. Subsequent boots are idempotent. To bring your own certs, pre-populate
# atl-certs and atl-ca-private with the expected files before starting.
#
# Requires Docker Compose v2 (compose-spec).

services:

  # ── cert bootstrap ────────────────────────────────────────────────────────
  # Generates TLS material on first boot, exits on subsequent boots.
  # Mounts both atl-certs (public) and atl-ca-private (CA key only).
  # No other service ever mounts atl-ca-private except the signer.
  certs:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache openssl >/dev/null 2>&1 && sh /scripts/init-certs.sh"
    volumes:
      - atl-certs:/certs
      - atl-ca-private:/ca-private
      - ./deploy/init-certs.sh:/scripts/init-certs.sh:ro
    environment:
      CERT_DIR: /certs
      CA_PRIVATE_DIR: /ca-private
      ATLANTIS_DOMAIN: ${ATLANTIS_DOMAIN:-}
    restart: "no"

  # ── postgres ──────────────────────────────────────────────────────────────
  # timescale/timescaledb-ha bundles timescaledb + pgvector + postgis +
  # pg_cron + a few more OSS extensions — covers every extension atlantis
  # callers can declare today. If you don't need timescale, the smaller
  # pgvector/pgvector:pg16 image is a drop-in.
  postgres:
    # Bundled Postgres. Skipped in BYO mode (see COMPOSE_PROFILES in .env).
    # The `:-changeme` default exists because docker compose interpolates
    # every service definition even when the profile is inactive; in BYO
    # mode the default is unused because the service doesn't start.
    # Bundled-mode operators MUST override PG_PASSWORD — the literal
    # "changeme" booting a Postgres on an exposed port is exploitable.
    profiles: ["bundled"]
    image: timescale/timescaledb-ha:pg16-all
    environment:
      POSTGRES_USER: ${PG_USER:-atlantis}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeme}
      POSTGRES_DB: ${PG_DB:-atlantis}
    volumes:
      - atl-pg:/var/lib/postgresql/data
      - ./deploy/pg-init.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-atlantis} -d ${PG_DB:-atlantis}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # ── memcached ─────────────────────────────────────────────────────────────
  memcached:
    # Bundled memcached. Skipped in BYO mode (see COMPOSE_PROFILES in .env).
    profiles: ["bundled"]
    image: memcached:1.6.29-alpine
    command: ["-m", "512", "-I", "5m"]
    restart: unless-stopped

  # ── atlantis gRPC server ──────────────────────────────────────────────────
  atlantis:
    image: ${ATLANTIS_IMAGE:-atlantis:local}
    ports:
      - "${ATLANTIS_GRPC_PORT:-9090}:9090"
      - "${ATLANTIS_HEALTH_PORT:-8081}:8081"
    depends_on:
      postgres:
        # required: false lets BYO mode start atlantis without the bundled
        # postgres service. Bundled mode still gates startup on the
        # healthcheck. atlantis has its own pool retry, so BYO Postgres
        # unreachable at boot just delays the first ready check.
        condition: service_healthy
        required: false
      certs:
        condition: service_completed_successfully
    environment:
      # Bundled: constructed from PG_USER/PG_PASSWORD/PG_DB, points at the
      # `postgres` container service. BYO: set PG_URL in .env to your own
      # Postgres URL — the constructed default is short-circuited.
      # PG_PASSWORD is validated by the `postgres` service itself (gated
      # behind the `bundled` profile); BYO mode skips that check.
      PG_URL: ${PG_URL:-postgres://${PG_USER:-atlantis}:${PG_PASSWORD:-}@postgres:5432/${PG_DB:-atlantis}?sslmode=disable}
      MEMCACHED_ADDR: ${MEMCACHED_ADDR:-memcached:11211}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Auto-migrate on boot. Safe for the compose bundle; set to "false"
      # in .env to run migrations manually via tidectl migrate-up.
      AUTO_MIGRATE: "${SELF_HOST_AUTO_MIGRATE:-true}"
      MIGRATIONS_DIR: /app/migrations
      # Schema mutation gates. Default flow: caller CI runs `tide apply`
      # against this server. Set ATL_ALLOW_APPLY_MUTATION=false in .env
      # for the regulated opt-in. ATL_MUTATION_ALLOWED_CALLERS scopes the
      # wildcard to a CN allowlist; ATL_OPERATOR_ALLOWED_CALLERS gates
      # RevokeCaller / RollbackSchema / AdoptBaseline.
      ATL_ALLOW_APPLY_MUTATION: "${ATL_ALLOW_APPLY_MUTATION:-true}"
      ATL_MUTATION_ALLOWED_CALLERS: "${ATL_MUTATION_ALLOWED_CALLERS:-}"
      ATL_OPERATOR_ALLOWED_CALLERS: "${ATL_OPERATOR_ALLOWED_CALLERS:-atlantis-console}"
      ATL_MIRROR_SCHEMA: "${ATL_MIRROR_SCHEMA:-false}"
      # mTLS: every caller and the console must present a client cert
      # signed by ca.crt. The console's CN is "atlantis-console".
      TLS_CERT_FILE: /certs/server.crt
      TLS_KEY_FILE: /certs/server.key
      TLS_CA_FILE: /certs/ca.crt
      # Postgres pool tuning. See cmd/server/config.go for defaults.
      PG_MAX_CONNS: "${PG_MAX_CONNS:-50}"
      PG_MIN_CONNS: "${PG_MIN_CONNS:-10}"
      PG_MAX_CONN_IDLE: "${PG_MAX_CONN_IDLE:-5m}"
      PG_MAX_CONN_LIFETIME: "${PG_MAX_CONN_LIFETIME:-1h}"
      PG_HEALTHCHECK_PERIOD: "${PG_HEALTHCHECK_PERIOD:-30s}"
      PG_QUERY_TIMEOUT_DEFAULT: "${PG_QUERY_TIMEOUT_DEFAULT:-2s}"
      # Tier-0 LRU.
      CACHE_LRU_SIZE: "${CACHE_LRU_SIZE:-1024}"
      # Outbox worker. FOR UPDATE SKIP LOCKED makes multiple replicas safe;
      # the bundle is single-replica by deploy convention, not correctness.
      OUTBOX_BATCH_SIZE: "${OUTBOX_BATCH_SIZE:-100}"
      OUTBOX_DRAIN_INTERVAL: "${OUTBOX_DRAIN_INTERVAL:-250ms}"
      OUTBOX_ALERT_LAG: "${OUTBOX_ALERT_LAG:-5m}"
      OUTBOX_POINTER_TTL: "${OUTBOX_POINTER_TTL:-24h}"
      # Rate limits. RATE_LIMIT_PER_CALLER defaults to seeding the console
      # CN at CONSOLE_RATE_LIMIT_QPS (console fans out many admin reads).
      # Set RATE_LIMIT_PER_CALLER in .env to replace with your own list.
      RATE_LIMIT_DEFAULT_QPS: "${RATE_LIMIT_DEFAULT_QPS:-1000}"
      RATE_LIMIT_BURST: "${RATE_LIMIT_BURST:-200}"
      RATE_LIMIT_SATURATION_CUTOFF: "${RATE_LIMIT_SATURATION_CUTOFF:-0.80}"
      RATE_LIMIT_PER_CALLER: "${RATE_LIMIT_PER_CALLER:-atlantis-console=${CONSOLE_RATE_LIMIT_QPS:-5000}}"
      # Observability. Empty disables OTel export.
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    volumes:
      - atl-certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/readyz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ── cert signer ───────────────────────────────────────────────────────────
  # Holds the CA private key. The console BFF is the only caller; it posts
  # a CSR and receives a signed leaf cert. The CA key never leaves this
  # container. Only atl-ca-private is mounted here — not atl-certs.
  #
  # PG_URL gives the signer read-only access to atlantis.caller_identities
  # so it can reject CSRs for unregistered CNs (defense in depth alongside
  # the console BFF's pre-check).
  signer:
    image: ${SIGNER_IMAGE:-atlantis-signer:local}
    depends_on:
      certs:
        condition: service_completed_successfully
      postgres:
        # required: false — see atlantis service above. BYO mode skips.
        condition: service_healthy
        required: false
    environment:
      CA_DIR: /ca-private
      SIGNER_LISTEN: ":7070"
      # Signer reads atlantis.caller_identities to reject CSRs for
      # unregistered CNs. Same PG_URL as the atlantis container.
      PG_URL: ${PG_URL:-postgres://${PG_USER:-atlantis}:${PG_PASSWORD:-}@postgres:5432/${PG_DB:-atlantis}?sslmode=disable}
    volumes:
      - atl-ca-private:/ca-private:ro
    # Expose on the host loopback so `make self-host-caller-cert` can POST
    # CSRs directly from the host without needing the full stack routing.
    ports:
      - "127.0.0.1:${SIGNER_PORT:-7071}:7070"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:7070/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  # ── atlantis-console ──────────────────────────────────────────────────────
  # Image is built by `make self-host-up` (depends on build-console-image).
  # If you bring up compose directly (without the Makefile), build first
  # with: make build-console-image
  console:
    image: ${CONSOLE_IMAGE:-atlantis-console:local}
    depends_on:
      atlantis:
        condition: service_healthy
      signer:
        condition: service_healthy
      certs:
        condition: service_completed_successfully
    environment:
      ATL_ENDPOINT: atlantis:9090
      ATL_TLS_CA: /certs/ca.crt
      ATL_TLS_CERT: /certs/console.crt
      ATL_TLS_KEY: /certs/console.key
      ATL_HEALTH_LISTEN: atlantis:8081
      CONSOLE_LISTEN: ":3000"
      CONSOLE_SESSION_SECRET: ${CONSOLE_SESSION_SECRET:?set CONSOLE_SESSION_SECRET in .env}
      # Cookie Secure flag. Default false so http://localhost works out of
      # the box; set to true in .env when terminating TLS in front.
      CONSOLE_COOKIE_SECURE: "${CONSOLE_COOKIE_SECURE:-false}"
      # Console uses the same Postgres instance, separate schema.
      # BYO: CONSOLE_PG_URL falls back to PG_URL when set, then to the
      # constructed bundle URL. Set CONSOLE_PG_URL in .env only if the
      # console needs a different connection than the server (different
      # role, separate pool, etc.).
      CONSOLE_PG_URL: ${CONSOLE_PG_URL:-${PG_URL:-postgres://${PG_USER:-atlantis}:${PG_PASSWORD:-}@postgres:5432/${PG_DB:-atlantis}?sslmode=disable}}
      # Signer address for cert issuance from the console UI.
      ATL_SIGNER_ADDR: http://signer:7070
      # Operator-action audit retention (days). Monthly partitions are
      # dropped past this age. See deploy/.env.example for the
      # SOC 2 / HIPAA / SOX baseline values.
      CONSOLE_AUDIT_RETENTION_DAYS: "${CONSOLE_AUDIT_RETENTION_DAYS:-365}"
      # Sandbox limits.
      SANDBOX_PER_USER_LIMIT: "${SANDBOX_PER_USER_LIMIT:-3}"
      SANDBOX_TTL: "${SANDBOX_TTL:-30m}"
      # Optional: enable schema PR generation. Fine-grained PAT needs
      # contents:write + pull_requests:write on each caller's repo.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "${CONSOLE_PORT:-3000}:3000"
    volumes:
      - atl-certs:/certs:ro
    restart: unless-stopped

volumes:
  atl-pg:
  atl-certs:
  # CA private key — mounted only by 'certs' (init, rw) and 'signer' (ro).
  # Never mount this into atlantis, console, or any caller container.
  atl-ca-private:
